<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Family Game Night</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0f0f1a;--surface:#1a1a2e;--surface2:#252540;--surface3:#2f2f4a;
--text:#f0eef6;--text2:#a8a4b8;--text3:#6b6780;
--accent:#7c5cfc;--accent2:#9f7afa;--accent-glow:rgba(124,92,252,0.3);
--red:#ef4444;--green:#22c55e;--yellow:#eab308;--blue:#3b82f6;--pink:#ec4899;--orange:#f97316;--teal:#14b8a6;
--radius:14px;--radius-sm:8px;--radius-lg:20px;
--shadow:0 4px 20px rgba(0,0,0,0.3);
--transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden}
button{font-family:inherit;cursor:pointer;border:none;outline:none}
input{font-family:inherit;outline:none}

/* Shared */
.screen{display:none;min-height:100dvh;padding:20px;max-width:600px;margin:0 auto;animation:fadeIn 0.3s ease}
.screen.active{display:flex;flex-direction:column}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
@keyframes pop{0%{transform:scale(0.8);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}

.btn{padding:14px 28px;border-radius:var(--radius);font-size:16px;font-weight:600;transition:var(--transition);display:inline-flex;align-items:center;justify-content:center;gap:8px}
.btn-primary{background:var(--accent);color:white}
.btn-primary:hover{background:var(--accent2);transform:translateY(-1px)}
.btn-primary:active{transform:translateY(0)}
.btn-secondary{background:var(--surface2);color:var(--text)}
.btn-secondary:hover{background:var(--surface3)}
.btn-danger{background:var(--red);color:white}
.btn-sm{padding:10px 18px;font-size:14px;border-radius:var(--radius-sm)}
.btn-block{width:100%}
.btn-icon{width:44px;height:44px;padding:0;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--surface2);color:var(--text2);font-size:20px}
.btn-icon:hover{background:var(--surface3);color:var(--text)}

.back-btn{position:fixed;top:16px;left:16px;z-index:100}
.card{background:var(--surface);border-radius:var(--radius-lg);padding:24px;box-shadow:var(--shadow)}
.badge{display:inline-block;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}

.input{width:100%;padding:14px 16px;border-radius:var(--radius);border:2px solid var(--surface3);background:var(--surface);color:var(--text);font-size:16px;transition:var(--transition)}
.input:focus{border-color:var(--accent)}
.input::placeholder{color:var(--text3)}

.timer-bar{height:6px;border-radius:3px;background:var(--surface3);overflow:hidden;margin:12px 0}
.timer-bar-fill{height:100%;border-radius:3px;transition:width 1s linear}
.score-display{font-size:13px;color:var(--text2);text-align:center;margin:8px 0}

/* HOME SCREEN */
#home{padding-top:40px}
.home-header{text-align:center;margin-bottom:32px}
.home-header h1{font-size:32px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.home-header p{color:var(--text2);font-size:15px}

.game-grid{display:grid;gap:16px}
.game-card{background:var(--surface);border-radius:var(--radius-lg);padding:20px;cursor:pointer;transition:var(--transition);border:2px solid transparent;position:relative;overflow:hidden}
.game-card:hover{transform:translateY(-2px);border-color:var(--card-color,var(--accent))}
.game-card:active{transform:translateY(0)}
.game-card-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:12px}
.game-card h3{font-size:18px;font-weight:700;margin-bottom:4px}
.game-card p{font-size:13px;color:var(--text2);line-height:1.4}
.game-card .game-meta{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.game-card .game-meta span{font-size:11px;padding:3px 8px;border-radius:12px;background:var(--surface2);color:var(--text2)}

/* TABOO */
.taboo-card{background:linear-gradient(135deg,#1e1b4b,#312e81);border-radius:var(--radius-lg);padding:28px;text-align:center;min-height:280px;display:flex;flex-direction:column;justify-content:center;position:relative}
.taboo-word{font-size:32px;font-weight:800;margin-bottom:20px;color:white}
.taboo-forbidden{display:flex;flex-direction:column;gap:6px}
.taboo-forbidden span{font-size:16px;color:#ef4444;font-weight:600;padding:4px 12px;background:rgba(239,68,68,0.15);border-radius:var(--radius-sm);display:inline-block}
.taboo-actions{display:flex;gap:12px;margin-top:20px;justify-content:center}

/* TRIVIA */
.trivia-question{font-size:20px;font-weight:700;text-align:center;margin:20px 0;line-height:1.4}
.trivia-category{text-align:center;margin-bottom:8px}
.trivia-options{display:flex;flex-direction:column;gap:10px}
.trivia-option{padding:16px 20px;border-radius:var(--radius);background:var(--surface2);color:var(--text);font-size:15px;text-align:left;transition:var(--transition);border:2px solid transparent;font-weight:500}
.trivia-option:hover:not(:disabled){background:var(--surface3);border-color:var(--accent)}
.trivia-option.correct{background:rgba(34,197,94,0.2);border-color:var(--green);color:var(--green)}
.trivia-option.wrong{background:rgba(239,68,68,0.2);border-color:var(--red);color:var(--red)}
.trivia-option:disabled{cursor:default}

/* CHARADES */
.charades-prompt{font-size:36px;font-weight:800;text-align:center;margin:40px 0;color:white;animation:pop 0.3s ease}
.charades-category-badge{text-align:center}

/* PICTIONARY */
.draw-canvas-wrap{position:relative;background:white;border-radius:var(--radius);overflow:hidden;touch-action:none;margin:12px 0}
.draw-canvas-wrap canvas{display:block;width:100%;cursor:crosshair}
.draw-tools{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;padding:8px 0}
.color-btn{width:32px;height:32px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:var(--transition)}
.color-btn.active{border-color:white;transform:scale(1.2)}
.draw-word{font-size:24px;font-weight:800;text-align:center;color:var(--yellow);margin:8px 0}

/* FAMILY FEUD */
.feud-board{display:flex;flex-direction:column;gap:6px;margin:12px 0}
.feud-answer{display:flex;align-items:center;height:48px;border-radius:var(--radius-sm);overflow:hidden;cursor:pointer;transition:var(--transition)}
.feud-answer.hidden{background:var(--surface2);justify-content:center}
.feud-answer.hidden:hover{background:var(--surface3)}
.feud-answer .feud-num{width:36px;height:100%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0;background:rgba(234,179,8,0.2);color:var(--yellow)}
.feud-answer .feud-text{flex:1;padding:0 12px;font-weight:600;font-size:14px}
.feud-answer .feud-pts{padding:0 12px;font-weight:800;color:var(--yellow);font-size:14px}
.feud-answer.revealed{background:linear-gradient(135deg,rgba(234,179,8,0.15),rgba(234,179,8,0.05));border:1px solid rgba(234,179,8,0.3);animation:pop 0.3s ease}
.feud-question{font-size:18px;font-weight:700;text-align:center;margin:16px 0;line-height:1.4;color:var(--text)}
.feud-strikes{display:flex;gap:12px;justify-content:center;margin:12px 0}
.feud-x{font-size:36px;opacity:0.15;transition:all 0.3s ease}
.feud-x.active{opacity:1;color:var(--red);transform:scale(1.3);animation:shake 0.3s ease}
.feud-banner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--yellow);color:#1a1a2e;padding:16px 32px;border-radius:var(--radius-lg);font-size:22px;font-weight:800;z-index:300;animation:pop 0.3s ease;box-shadow:0 8px 40px rgba(234,179,8,0.4)}
.feud-team-scores{display:flex;gap:12px;margin:8px 0}
.feud-team-score{flex:1;text-align:center;padding:10px;border-radius:var(--radius-sm);background:var(--surface2)}
.feud-team-score.active{border:2px solid var(--yellow)}
.feud-team-score .name{font-size:12px;color:var(--text2);font-weight:600}
.feud-team-score .pts{font-size:20px;font-weight:800;color:var(--yellow)}

/* CODENAMES */
.cn-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin:12px 0}
.cn-card{aspect-ratio:1.4;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;text-align:center;font-size:11px;font-weight:700;cursor:pointer;transition:var(--transition);padding:4px;line-height:1.2;text-transform:uppercase;letter-spacing:0.3px;word-break:break-word}
.cn-card.unrevealed{background:var(--surface2);color:var(--text)}
.cn-card.unrevealed:hover{background:var(--surface3);transform:translateY(-1px)}
.cn-card.red{background:linear-gradient(135deg,#dc2626,#b91c1c);color:white}
.cn-card.blue{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:white}
.cn-card.neutral{background:var(--surface3);color:var(--text3)}
.cn-card.assassin{background:linear-gradient(135deg,#1a1a2e,#0f0f1a);color:var(--red);border:2px solid var(--red)}
.cn-card.revealed{cursor:default;opacity:0.85}
.cn-card.sp-red{box-shadow:inset 0 0 0 2px rgba(220,38,38,0.4)}
.cn-card.sp-blue{box-shadow:inset 0 0 0 2px rgba(37,99,235,0.4)}
.cn-card.sp-neutral{box-shadow:inset 0 0 0 2px rgba(100,100,120,0.3)}
.cn-card.sp-assassin{box-shadow:inset 0 0 0 2px rgba(239,68,68,0.6)}
.cn-turn-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-radius:var(--radius-sm);margin:8px 0;font-weight:600;font-size:14px}
.cn-turn-bar.red-turn{background:rgba(220,38,38,0.15);color:#ef4444}
.cn-turn-bar.blue-turn{background:rgba(37,99,235,0.15);color:#60a5fa}
.cn-scores{display:flex;gap:12px;margin:8px 0}
.cn-score-box{flex:1;text-align:center;padding:8px;border-radius:var(--radius-sm);font-weight:700}
.cn-score-box.red{background:rgba(220,38,38,0.15);color:#ef4444}
.cn-score-box.blue{background:rgba(37,99,235,0.15);color:#60a5fa}
.cn-clue-area{margin:10px 0;text-align:center}
.cn-clue-display{font-size:20px;font-weight:800;margin:8px 0}

/* TUTORIAL OVERLAY */
.tutorial-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn 0.2s ease}
.tutorial-card{background:var(--surface);border-radius:var(--radius-lg);padding:28px;max-width:440px;width:100%;max-height:80vh;overflow-y:auto;animation:slideUp 0.3s ease}
.tutorial-card h2{font-size:22px;font-weight:800;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.tutorial-card h3{font-size:14px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:0.5px;margin:16px 0 8px}
.tutorial-card p,.tutorial-card li{font-size:14px;color:var(--text2);line-height:1.6;margin-bottom:6px}
.tutorial-card ol,.tutorial-card ul{padding-left:20px;margin:8px 0}
.tutorial-card .tip{background:rgba(124,92,252,0.1);border-left:3px solid var(--accent);padding:8px 12px;border-radius:0 var(--radius-sm) var(--radius-sm) 0;margin:12px 0;font-size:13px;color:var(--text2)}
.tutorial-close{margin-top:20px}

/* DRAW WORD HIDDEN */
/* PASS THE PHONE */
.pass-screen{position:fixed;inset:0;background:var(--bg);z-index:250;display:flex;flex-direction:column;align-items:center;justify-content:center;animation:fadeIn 0.3s ease;text-align:center;padding:20px}
.pass-screen .pass-icon{font-size:72px;margin-bottom:20px;animation:pulse 1.5s infinite}
.pass-screen .pass-name{font-size:28px;font-weight:800;margin-bottom:8px}
.pass-screen .pass-sub{font-size:15px;color:var(--text2);margin-bottom:32px}
.pass-screen .pass-ready{padding:18px 48px;border-radius:var(--radius-lg);font-size:18px;font-weight:700}

/* CONFETTI */
.confetti-container{position:fixed;inset:0;pointer-events:none;z-index:400;overflow:hidden}
.confetti-piece{position:absolute;width:10px;height:10px;top:-10px;opacity:0.9;animation:confettiFall linear forwards}
@keyframes confettiFall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}

.draw-word-hidden{font-size:16px;font-weight:600;text-align:center;color:var(--text3);margin:8px 0;padding:10px;background:var(--surface2);border-radius:var(--radius-sm);cursor:pointer;transition:var(--transition)}
.draw-word-hidden:hover{background:var(--surface3)}
.draw-word-revealed{font-size:24px;font-weight:800;text-align:center;color:var(--yellow);margin:8px 0;animation:pop 0.2s ease}

/* WOULD YOU RATHER */
.wyr-option{padding:24px;border-radius:var(--radius-lg);font-size:16px;font-weight:600;line-height:1.4;text-align:center;transition:var(--transition);cursor:pointer;min-height:100px;display:flex;align-items:center;justify-content:center}
.wyr-option:first-child{background:linear-gradient(135deg,rgba(124,92,252,0.2),rgba(124,92,252,0.1));border:2px solid rgba(124,92,252,0.3)}
.wyr-option:last-child{background:linear-gradient(135deg,rgba(236,72,153,0.2),rgba(236,72,153,0.1));border:2px solid rgba(236,72,153,0.3)}
.wyr-option:hover{transform:scale(1.02)}
.wyr-option.selected{transform:scale(1.05)}
.wyr-or{text-align:center;font-size:14px;font-weight:700;color:var(--text3);padding:12px 0}
.wyr-results{display:flex;gap:4px;height:40px;border-radius:var(--radius-sm);overflow:hidden;margin:12px 0}
.wyr-bar{display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;transition:width 0.5s ease}

/* WORD ASSOCIATION */
.wa-current-word{font-size:40px;font-weight:800;text-align:center;margin:30px 0;color:var(--teal)}
.wa-player-tag{text-align:center;font-size:18px;font-weight:600;color:var(--text2);margin-bottom:16px}
.wa-timer-circle{width:100px;height:100px;border-radius:50%;border:4px solid var(--teal);display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:800;margin:0 auto 20px;transition:border-color 0.3s}
.wa-timer-circle.warning{border-color:var(--yellow)}
.wa-timer-circle.danger{border-color:var(--red);animation:pulse 0.5s infinite}
.wa-chain{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:16px 0;max-height:80px;overflow-y:auto}
.wa-chain span{padding:4px 10px;border-radius:12px;background:var(--surface2);font-size:12px;color:var(--text2)}

/* Scoreboard */
.scoreboard{margin:16px 0}
.score-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-radius:var(--radius-sm);margin-bottom:6px;background:var(--surface2)}
.score-row.highlight{background:linear-gradient(135deg,rgba(124,92,252,0.2),rgba(124,92,252,0.1));border:1px solid rgba(124,92,252,0.3)}
.score-row .name{font-weight:600}
.score-row .pts{font-weight:700;color:var(--accent)}

/* Setup forms */
.setup-section{margin:20px 0}
.setup-section label{display:block;font-size:13px;color:var(--text2);margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.player-list{display:flex;flex-direction:column;gap:8px;margin:12px 0}
.player-row{display:flex;gap:8px;align-items:center}
.player-row .input{flex:1}
.player-row .remove-btn{width:36px;height:36px;border-radius:50%;background:rgba(239,68,68,0.15);color:var(--red);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.add-player-btn{color:var(--accent);background:none;font-size:14px;font-weight:600;padding:8px 0}
.mode-toggle{display:flex;gap:8px;margin:12px 0}
.mode-toggle button{flex:1;padding:12px;border-radius:var(--radius);background:var(--surface2);color:var(--text2);font-weight:600;font-size:14px;transition:var(--transition)}
.mode-toggle button.active{background:var(--accent);color:white}

/* TEAM TRANSITION OVERLAY */
@keyframes teamTransIn{from{opacity:0;transform:scale(1.1)}to{opacity:1;transform:scale(1)}}
@keyframes teamCountdown{0%{transform:scale(0.5);opacity:0}50%{transform:scale(1.3);opacity:1}100%{transform:scale(1);opacity:1}}
@keyframes teamNamePulse{0%{transform:translateY(0)}50%{transform:translateY(-8px)}100%{transform:translateY(0)}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 15px rgba(124,92,252,0.4)}50%{box-shadow:0 0 30px rgba(124,92,252,0.7),0 0 60px rgba(236,72,153,0.3)}}

.team-transition{position:fixed;inset:0;z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#1e1045,#2d1a6e,#4a1a5e);animation:teamTransIn 0.4s ease;text-align:center;padding:20px;cursor:pointer}
.team-transition .tt-icon{font-size:72px;margin-bottom:16px;animation:teamNamePulse 1.5s ease infinite}
.team-transition .tt-name{font-size:36px;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.team-transition .tt-subtitle{font-size:16px;color:rgba(255,255,255,0.6);margin-bottom:32px}
.team-transition .tt-countdown{font-size:80px;font-weight:900;color:white;animation:teamCountdown 0.8s ease;text-shadow:0 0 40px rgba(124,92,252,0.6)}
.team-transition .tt-tap{font-size:13px;color:rgba(255,255,255,0.35);margin-top:40px}

/* ACTIVE TEAM HIGHLIGHTING */
@keyframes activeGlow{0%,100%{box-shadow:0 0 8px rgba(124,92,252,0.3)}50%{box-shadow:0 0 18px rgba(124,92,252,0.5)}}
.team-score-bar{display:flex;gap:12px;margin:8px 0}
.team-score-box{flex:1;text-align:center;padding:12px 8px;border-radius:var(--radius-sm);transition:all 0.5s cubic-bezier(0.4,0,0.2,1);border:2px solid transparent}
.team-score-box .team-label{font-size:12px;font-weight:600;transition:all 0.4s ease}
.team-score-box .team-pts{font-size:22px;font-weight:800;transition:all 0.4s ease}
.team-score-box.active-team{background:linear-gradient(135deg,rgba(124,92,252,0.25),rgba(236,72,153,0.15));border-color:var(--accent);animation:activeGlow 2s ease infinite}
.team-score-box.active-team .team-label{color:var(--accent2);font-weight:700}
.team-score-box.active-team .team-pts{color:white;transform:scale(1.05)}
.team-score-box.inactive-team{background:var(--surface2);opacity:0.55}
.team-score-box.inactive-team .team-label{color:var(--text3)}
.team-score-box.inactive-team .team-pts{color:var(--text3)}

/* FAMILY FEUD — HIDDEN BOARD */
@keyframes feudFlip{0%{transform:rotateX(90deg);opacity:0}100%{transform:rotateX(0);opacity:1}}
@keyframes strikeSlam{0%{transform:scale(0);opacity:0}50%{transform:scale(1.6);opacity:1}100%{transform:scale(1);opacity:1}}
.feud-answer.hidden .feud-text,.feud-answer.hidden .feud-pts{visibility:hidden}
.feud-answer.revealed{animation:feudFlip 0.4s ease;transform-origin:center}
.feud-x.slam{animation:strikeSlam 0.35s ease}

/* Overlay */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;animation:fadeIn 0.2s ease}
.overlay-card{background:var(--surface);border-radius:var(--radius-lg);padding:32px;max-width:400px;width:100%;text-align:center;animation:slideUp 0.3s ease}
.overlay-card h2{font-size:24px;font-weight:800;margin-bottom:12px}
.overlay-card p{color:var(--text2);margin-bottom:20px}

/* WHEEL OF FORTUNE */
.wof-wheel-wrap{position:relative;width:280px;height:280px;margin:10px auto;user-select:none}
.wof-wheel{width:100%;height:100%;border-radius:50%;position:relative;transition:none;border:4px solid var(--surface3)}
.wof-pointer{position:absolute;top:-14px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:14px solid transparent;border-right:14px solid transparent;border-top:24px solid var(--yellow);z-index:10;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.4))}
.wof-spin-btn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--pink));color:white;font-weight:800;font-size:13px;box-shadow:0 4px 15px rgba(124,92,252,0.4);z-index:5;transition:var(--transition);text-transform:uppercase;letter-spacing:0.5px}
.wof-spin-btn:hover{transform:translate(-50%,-50%) scale(1.08)}
.wof-spin-btn:disabled{opacity:0.5;cursor:not-allowed;transform:translate(-50%,-50%)}
.wof-result-banner{text-align:center;font-size:22px;font-weight:800;padding:8px;border-radius:var(--radius-sm);margin:6px 0;animation:pop 0.3s ease}

// ─── AUDIO ───
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function ensureAudio(){if(!audioCtx)audioCtx=new AudioCtx()}
function playTone(freq,dur,type='sine',vol=0.15){
  ensureAudio();
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  o.connect(g);g.connect(audioCtx.destination);
  o.start();o.stop(audioCtx.currentTime+dur);
}
function sfxCorrect(){playTone(523,0.1);setTimeout(()=>playTone(659,0.1),100);setTimeout(()=>playTone(784,0.15),200)}
function sfxWrong(){playTone(200,0.2,'sawtooth',0.1);setTimeout(()=>playTone(160,0.3,'sawtooth',0.1),150)}
function sfxClick(){playTone(800,0.05,'sine',0.08)}
function sfxBuzz(){playTone(150,0.4,'square',0.12)}
function sfxTick(){playTone(1000,0.03,'sine',0.06)}
function sfxWin(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>playTone(f,0.15),i*100))}
function sfxReveal(){playTone(440,0.08);setTimeout(()=>playTone(554,0.08),80);setTimeout(()=>playTone(659,0.12),160)}
function sfxDramatic(){playTone(220,0.3,'triangle',0.12);setTimeout(()=>playTone(277,0.3,'triangle',0.12),300);setTimeout(()=>playTone(330,0.4,'triangle',0.15),600)}

function showPassScreen(playerName,subtitle,onReady){
  const div=document.createElement('div');
  div.className='pass-screen';
  div.innerHTML=`
    <div class="pass-icon">📱</div>
    <div class="pass-name">Pass to ${playerName}</div>
    <div class="pass-sub">${subtitle||'Tap when ready'}</div>

  `;
  document.body.appendChild(div);
  document.getElementById('passReady').onclick=()=>{sfxClick();div.remove();if(onReady)onReady();};
}

// ─── TEAM TRANSITION ───
function showTeamTransition(teamName, onDone){
  const div=document.createElement('div');
  div.className='team-transition';
  div.innerHTML=`
    <div class="tt-icon">🎮</div>
    <div class="tt-name">${teamName}'s Turn!</div>
    <div class="tt-subtitle">Get ready...</div>
    <div class="tt-countdown" id="ttCount">3</div>
    <div class="tt-tap">Tap to skip</div>
  `;
  document.body.appendChild(div);
  let count=3;
  const countEl=div.querySelector('#ttCount');
  const interval=setInterval(()=>{
    count--;
    if(count>0){
      countEl.textContent=count;
      countEl.style.animation='none';countEl.offsetHeight;countEl.style.animation='teamCountdown 0.8s ease';
      sfxTick();
    } else {
      clearInterval(interval);
      div.remove();
      if(onDone)onDone();
    }
  },1000);
  div.onclick=()=>{clearInterval(interval);div.remove();if(onDone)onDone();};
  sfxTick();
}

// ─── CONFETTI ───
function showConfetti(){
  const container=document.createElement('div');
  container.className='confetti-container';
  const colors=['#7c5cfc','#ec4899','#22c55e','#eab308','#3b82f6','#f97316','#ef4444','#14b8a6'];
  for(let i=0;i<60;i++){
    const piece=document.createElement('div');
    piece.className='confetti-piece';
    const color=colors[Math.floor(Math.random()*colors.length)];
    const left=Math.random()*100;
    const size=Math.random()*8+6;
    const dur=Math.random()*2+2;
    const delay=Math.random()*1.5;
    const shape=Math.random()>0.5?'50%':'0';
    piece.style.cssText=`left:${left}%;width:${size}px;height:${size}px;background:${color};border-radius:${shape};animation-duration:${dur}s;animation-delay:${delay}s;`;
    container.appendChild(piece);
  }
  document.body.appendChild(container);
  setTimeout(()=>container.remove(),4500);
}

// ─── UTILS ───
function shuffle(a){let b=[...a];for(let i=b.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0)}

function showTutorial(gameId){
  const t=TUTORIALS[gameId];
  if(!t)return;
  const overlay=document.createElement('div');
  overlay.className='tutorial-overlay';
  overlay.onclick=e=>{if(e.target===overlay)overlay.remove();};
  overlay.innerHTML=`
    <div class="tutorial-card">
      <h2>${t.icon} ${t.title}</h2>
      ${t.sections.map(s=>{
        if(s.h)return `<h3>${s.h}</h3>`;
        return '';
      }).join('')
      // rebuild properly:
      }
    </div>
  `;
  // Rebuild content properly
  const card=overlay.querySelector('.tutorial-card');
  card.innerHTML=`<h2>${t.icon} ${t.title}</h2>`;
  t.sections.forEach(s=>{
    if(s.h){const h=document.createElement('h3');h.textContent=s.h;card.appendChild(h);}
    if(s.p){const p=document.createElement('p');p.textContent=s.p;card.appendChild(p);}
    if(s.list){const ol=document.createElement('ol');s.list.forEach(li=>{const l=document.createElement('li');l.textContent=li;ol.appendChild(l);});card.appendChild(ol);}
    if(s.tip){const d=document.createElement('div');d.className='tip';d.textContent='💡 '+s.tip;card.appendChild(d);}
  });
  const btn=document.createElement('button');
  btn.className='btn btn-primary btn-block tutorial-close';
  btn.textContent='Got it!';
  btn.onclick=()=>overlay.remove();
  card.appendChild(btn);
  document.body.appendChild(overlay);
}

function wofDrawWheel(canvas,rotation){
  const ctx=canvas.getContext('2d');
  const w=canvas.width,h=canvas.height;
  const cx=w/2,cy=h/2,r=w/2-4;
  ctx.clearRect(0,0,w,h);
  ctx.save();
  ctx.translate(cx,cy);
  ctx.rotate(rotation*Math.PI/180);
  const n=WOF_SEGMENTS.length;
  const arc=2*Math.PI/n;
  for(let i=0;i<n;i++){
    ctx.beginPath();ctx.moveTo(0,0);
    ctx.arc(0,0,r,i*arc,(i+1)*arc);
    ctx.closePath();
    ctx.fillStyle=WOF_COLORS[i];ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1;ctx.stroke();
    // text
    ctx.save();
    ctx.rotate(i*arc+arc/2);
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='white';ctx.font='bold 11px sans-serif';
    const label=WOF_SEGMENTS[i]==='BANKRUPT'?'💀':WOF_SEGMENTS[i]==='LOSE'?'LOSE':'$'+WOF_SEGMENTS[i];
    ctx.fillText(label,r*0.68,0);
    ctx.restore();
  }
  ctx.restore();
}

function wofSpinWheel(callback){
  const s=gameState;
  if(s.spinning)return;
  s.spinning=true;
  sfxClick();
  const canvas=document.getElementById('wofCanvas');
  if(!canvas)return;
  const totalSpin=1800+Math.random()*1800; // 5-10 full rotations
  const startRot=s.wheelRotation||0;
  const endRot=startRot+totalSpin;
  const duration=4000;
  const startTime=Date.now();

  // tick sound during spin
  let lastTick=0;
  const tickInterval=setInterval(()=>{
    const elapsed=Date.now()-startTime;
    const progress=Math.min(elapsed/duration,1);
    if(progress>0.7){
      const tickRate=200+800*((progress-0.7)/0.3);
      if(Date.now()-lastTick>tickRate){sfxTick();lastTick=Date.now();}
    } else if(Date.now()-lastTick>100){sfxTick();lastTick=Date.now();}
  },50);

  function animate(){
    const elapsed=Date.now()-startTime;
    const progress=Math.min(elapsed/duration,1);
    // ease out cubic
    const eased=1-Math.pow(1-progress,3);
    const currentRot=startRot+totalSpin*eased;
    wofDrawWheel(canvas,currentRot);
    if(progress<1){
      requestAnimationFrame(animate);
    } else {
      clearInterval(tickInterval);
      s.wheelRotation=endRot%360;
      s.spinning=false;
      // determine segment
      const n=WOF_SEGMENTS.length;
      const arc=360/n;
      // pointer is at top (270 degrees in standard), wheel rotates clockwise
      const normalizedAngle=(360-(endRot%360)+270)%360;
      const idx=Math.floor(normalizedAngle/arc)%n;
      callback(WOF_SEGMENTS[idx]);
    }
  }
  animate();
}

function wofGetPuzzle(){
  const s=gameState;
  if(s.usedPuzzles.size>=WOF_PUZZLES.length)s.usedPuzzles=new Set();
  let pool=WOF_PUZZLES.filter((_,i)=>!s.usedPuzzles.has(i));
  const ri=Math.floor(Math.random()*pool.length);
  const pi=WOF_PUZZLES.indexOf(pool[ri]);
  s.usedPuzzles.add(pi);
  return WOF_PUZZLES[pi];
}

function wofRenderBoard(){
  const s=gameState;
  const phrase=s.puzzle.phrase;
  let html='';
  for(let i=0;i<phrase.length;i++){
    const ch=phrase[i];
    if(ch===' '){
      html+='<div class="wof-tile space"></div>';
    } else if(!/[A-Z]/.test(ch)){
      html+=`<div class="wof-tile punct">${ch}</div>`;
    } else if(s.revealedLetters.has(ch)){
      html+=`<div class="wof-tile revealed">${ch}</div>`;
    } else {
      html+='<div class="wof-tile blank"></div>';
    }
  }
  return html;
}

function wofRenderLetterButtons(){
  const s=gameState;
  let html='';
  for(const ch of 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'){
    const isVowel=VOWELS.includes(ch);
    const used=s.guessedLetters.has(ch);
    const disabled=used||s.phase!=='pick_letter'||(isVowel&&s.phase==='pick_letter'&&!s.buyingVowel)||(!isVowel&&s.buyingVowel);
    html+=`<button class="wof-letter-btn ${isVowel?'vowel':'consonant'} ${used?'used':''}" ${disabled?'disabled':''} onclick="wofPickLetter('${ch}')">${ch}</button>`;
  }
  return html;
}

function wofCheckSolved(){
  const s=gameState;
  const phrase=s.puzzle.phrase;
  for(const ch of phrase){
    if(/[A-Z]/.test(ch)&&!s.revealedLetters.has(ch))return false;
  }
  return true;
}

function wofCountLetter(ch){
  return gameState.puzzle.phrase.split('').filter(c=>c===ch).length;
}

function renderWOF(){
  const s=gameState;
  const el=document.getElementById('playContent');
  const team=s.teams[s.currentPlayer];
  const allVowelsGuessed=[...'AEIOU'].every(v=>s.guessedLetters.has(v));
  const canBuyVowel=team.roundBank>=250&&!s.buyingVowel&&!allVowelsGuessed&&(s.phase==='pick_letter'||s.phase==='spun'||s.phase==='spin');
  const canSolve=s.phase==='pick_letter'||s.phase==='spun'||s.phase==='spin';

  el.innerHTML=`
    ${renderTeamScoreBar(s.teams, s.currentPlayer)}
    <div class="wof-category">📂 ${s.puzzle.cat}</div>
    <div class="wof-board" id="wofBoard">${wofRenderBoard()}</div>
    <div class="wof-player-bank">💰 Round Bank: $${team.roundBank||0}</div>
    <div style="text-align:center;font-size:12px;color:var(--text3)">Round ${s.round} of ${s.rounds}</div>
    <div class="wof-wheel-wrap">
      <div class="wof-pointer"></div>
      <canvas id="wofCanvas" width="280" height="280" style="border-radius:50%"></canvas>
      <button class="wof-spin-btn" id="wofSpinBtn" ${(s.phase!=='spin'&&s.phase!=='spun')||s.spinning?'disabled':''} onclick="wofDoSpin()">SPIN</button>
    </div>
    ${s.lastResult?`<div class="wof-result-banner" style="background:${s.lastResultColor};color:${s.lastResultTextColor||'white'}">${s.lastResult}</div>`:''}
    <div class="wof-letters">${wofRenderLetterButtons()}</div>
    <div class="wof-actions">
      <button class="btn btn-sm" style="background:rgba(234,179,8,0.2);color:var(--yellow)" ${!canBuyVowel||s.phase==='spin'||s.spinning?'disabled':''} onclick="wofBuyVowel()">Buy Vowel ($250)</button>
      <button class="btn btn-sm btn-primary" ${!canSolve||s.spinning?'disabled':''} onclick="wofTrySolve()">Solve!</button>
    </div>
  `;
  // draw wheel
  const canvas=document.getElementById('wofCanvas');
  if(canvas)wofDrawWheel(canvas,s.wheelRotation||0);
}

function wofDoSpin(){
  const s=gameState;
  if((s.phase!=='spin'&&s.phase!=='spun')||s.spinning)return;
  s.phase='spin';
  s.lastResult='';
  wofSpinWheel((segment)=>{
    if(segment==='BANKRUPT'){
      sfxBuzz();
      s.teams[s.currentPlayer].roundBank=0;
      s.lastResult='💀 BANKRUPT!';s.lastResultColor='var(--red)';
      setTimeout(()=>wofNextPlayer(),1500);
      renderWOF();
    } else if(segment==='LOSE'){
      sfxWrong();
      s.lastResult='⏭ Lose a Turn!';s.lastResultColor='var(--surface3)';
      setTimeout(()=>wofNextPlayer(),1500);
      renderWOF();
    } else {
      s.currentAmount=segment;
      s.phase='pick_letter';
      s.buyingVowel=false;
      sfxReveal();
      s.lastResult=`$${segment} — Pick a consonant!`;s.lastResultColor='var(--green)';
      renderWOF();
    }
  });
}

function wofPickLetter(ch){
  const s=gameState;
  if(s.guessedLetters.has(ch))return;
  s.guessedLetters.add(ch);

  const count=wofCountLetter(ch);
  if(count>0){
    sfxCorrect();
    s.revealedLetters.add(ch);
    if(s.buyingVowel){
      s.teams[s.currentPlayer].roundBank-=250;
      s.lastResult=`${ch} appears ${count} time${count>1?'s':''}!`;s.lastResultColor='var(--yellow)';s.lastResultTextColor='#1a1a2e';
    } else {
      const earned=s.currentAmount*count;
      s.teams[s.currentPlayer].roundBank+=earned;
      s.lastResult=`${ch} × ${count} = +$${earned}!`;s.lastResultColor='var(--green)';s.lastResultTextColor='white';
    }
    s.buyingVowel=false;
    // check if puzzle solved by revealing all letters
    if(wofCheckSolved()){
      wofSolveSuccess();return;
    }
    s.phase='spin'; // can spin again (stays their turn)
    // actually let them spin, buy vowel, or solve
    s.phase='spun';
    renderWOF();
  } else {
    sfxWrong();
    s.lastResult=`No ${ch}'s!`;s.lastResultColor='var(--surface3)';s.lastResultTextColor='var(--text)';
    s.buyingVowel=false;
    setTimeout(()=>wofNextPlayer(),1200);
    renderWOF();
  }
}

function wofBuyVowel(){
  const s=gameState;
  const team=s.teams[s.currentPlayer];
  if(team.roundBank<250)return;
  s.buyingVowel=true;
  s.phase='pick_letter';
  s.lastResult='Pick a vowel!';s.lastResultColor='rgba(234,179,8,0.3)';s.lastResultTextColor='var(--yellow)';
  renderWOF();
}

function wofTrySolve(){
  const s=gameState;
  const guess=prompt('Solve the puzzle:');
  if(!guess)return;
  const clean=guess.toUpperCase().replace(/[^A-Z ]/g,'').trim();
  const answer=s.puzzle.phrase.replace(/[^A-Z ]/g,'');
  if(clean===answer){
    wofSolveSuccess();
  } else {
    sfxWrong();
    s.lastResult='Wrong guess!';s.lastResultColor='var(--red)';
    setTimeout(()=>wofNextPlayer(),1200);
    renderWOF();
  }
}

function wofSolveSuccess(){
  const s=gameState;
  const team=s.teams[s.currentPlayer];
  // reveal all letters
  for(const ch of s.puzzle.phrase)if(/[A-Z]/.test(ch))s.revealedLetters.add(ch);
  // add round bank to total score
  team.score+=team.roundBank;
  sfxWin();showConfetti();
  s.lastResult=`🎉 ${team.name} solved it! +$${team.roundBank}`;s.lastResultColor='var(--green)';s.lastResultTextColor='white';
  renderWOF();
  setTimeout(()=>{
    s.round++;
    if(s.round>s.rounds){
      wofShowResults();
    } else {
      wofStartRound();
    }
  },2500);
}

function wofNextPlayer(){
  const s=gameState;
  s.currentPlayer=(s.currentPlayer+1)%s.teams.length;
  s.phase='spin';
  s.buyingVowel=false;
  s.lastResult='';
  const team=s.teams[s.currentPlayer];
  showTeamTransition(team.name,()=>{renderWOF();});
}

function wofStartRound(){
  const s=gameState;
  const puzzle=wofGetPuzzle();
  s.puzzle=puzzle;
  s.revealedLetters=new Set();
  s.guessedLetters=new Set();
  s.phase='spin';
  s.buyingVowel=false;
  s.currentAmount=0;
  s.lastResult='';
  s.lastResultColor='';
  s.lastResultTextColor='';
  // reset round banks
  s.teams.forEach(t=>t.roundBank=0);
  // next starting player rotates
  s.currentPlayer=(s.roundStarter)%s.teams.length;
  s.roundStarter++;
  const team=s.teams[s.currentPlayer];
  showTeamTransition(team.name,()=>{renderWOF();});
}

function wofShowResults(){
  const teams=[...gameState.teams].sort((a,b)=>b.score-a.score);
  const winner=teams[0];
  sfxWin();showConfetti();
  showScreen('results');
  document.getElementById('resultsContent').innerHTML=`
    <div style="text-align:center;margin:60px 0 24px;animation:pop 0.3s ease">
      <div style="font-size:64px;margin-bottom:16px">🎡</div>
      <h2 style="font-size:28px;font-weight:800">${winner.name} Wins!</h2>
      <p style="color:var(--text2);margin-top:4px">with $${winner.score}</p>
    </div>
    <div class="scoreboard">
      ${teams.map((t,i)=>`
        <div class="score-row ${i===0?'highlight':''}">
          <span class="name">${i===0?'🥇':i===1?'🥈':i===2?'🥉':'  '} ${t.name}</span>
          <span class="pts">$${t.score}</span>
        </div>
      `).join('')}
    </div>
    <button class="btn btn-primary btn-block" style="margin-top:24px" onclick="setupGame('wheeloffortune')">Play Again</button>
    <button class="btn btn-secondary btn-block" style="margin-top:10px" onclick="showScreen('home')">Back to Games</button>
  `;
}

// ─── SETUP HELPERS ───
let playerCount=0;
function addPlayer(){
  playerCount++;
  const list=document.getElementById('playerList');
  const div=document.createElement('div');div.className='player-row';div.id='player-'+playerCount;
  div.innerHTML=`<input class="input" placeholder="Player name" value="Player ${playerCount}"><button class="remove-btn" onclick="this.parentElement.remove()">×</button>`;
  list.appendChild(div);
}
function setMode(mode,btn){
  gameState.mode=mode;
  btn.parentElement.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const ts=document.getElementById('teamsSetup'),is=document.getElementById('individualSetup');
  if(ts)ts.style.display=mode==='teams'?'block':'none';
  if(is)is.style.display=mode==='individual'?'block':'none';
}
function setRounds(n,btn){
  gameState.rounds=n;
  btn.parentElement.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}
function setTimer(n,btn){
  gameState.timerSec=n;
  btn.parentElement.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function getPlayers(){
  const inputs=document.querySelectorAll('#playerList .input');
  return Array.from(inputs).map(i=>i.value.trim()).filter(v=>v);
}

//  TABOO GAME
// ════════════════════════════════════════════
function startTaboo(){
  const players=getPlayers();
  const s=gameState;
  s.deck=shuffle([...TABOO_CARDS]);
  s.usedWords=new Set();
  s.cardIdx=0;
  s.round=1;
  s.turnInRound=0;
  s.timeLeft=s.timerSec;

  if(s.mode==='teams'){
    const t1=document.getElementById('team1Name')?.value||'Team 1';
    const t2=document.getElementById('team2Name')?.value||'Team 2';
    s.teams=[{name:t1,score:0},{name:t2,score:0}];
    s.currentTeam=0;
  } else {
    s.teams=players.map(p=>({name:p,score:0}));
    s.currentTeam=0;
  }
  showScreen('play');
  renderTabooTurn();
}

function getTabooCard(){
  const s=gameState;
  if(s.usedWords.size>=TABOO_CARDS.length){s.usedWords=new Set();s.deck=shuffle([...TABOO_CARDS]);s.cardIdx=0;}
  while(s.cardIdx<s.deck.length&&s.usedWords.has(s.deck[s.cardIdx].word))s.cardIdx++;
  if(s.cardIdx>=s.deck.length){s.deck=shuffle([...TABOO_CARDS]);s.cardIdx=0;while(s.usedWords.has(s.deck[s.cardIdx].word))s.cardIdx++;}
  const card=s.deck[s.cardIdx];
  s.usedWords.add(card.word);
  s.cardIdx++;
  return card;
}

function renderTabooTurn(){
  const s=gameState;
  const team=s.teams[s.currentTeam];
  const card=getTabooCard();
  s.currentCard=card;
  s.timeLeft=s.timerSec;
  if(s.timer)clearInterval(s.timer);

  const el=document.getElementById('playContent');
  el.innerHTML=`
    ${s.mode==='teams'?renderTeamScoreBar(s.teams, s.currentTeam):''}
    <div style="text-align:center;margin-top:12px">
      <div class="badge" style="background:${s.mode==='teams'?'rgba(99,102,241,0.2)':'rgba(124,92,252,0.2)'};color:${s.mode==='teams'?'#818cf8':'#a78bfa'}">${team.name}'s Turn</div>
      <div class="score-display">Round ${s.round} of ${s.rounds}</div>
    </div>
    <div class="taboo-card" id="tabooCard">
      <div class="taboo-word">${card.word}</div>
      <div class="taboo-forbidden">${card.taboo.map(t=>`<span>🚫 ${t}</span>`).join('')}</div>
    </div>
    <div class="timer-bar"><div class="timer-bar-fill" id="timerBar" style="width:100%;background:var(--green)"></div></div>
    <div style="text-align:center;font-size:24px;font-weight:800" id="timerText">${s.timerSec}s</div>
    <div class="taboo-actions">
      <button class="btn btn-primary" onclick="tabooCorrect()">✓ Got it!</button>
      <button class="btn btn-secondary" onclick="tabooSkip()">⏭ Skip</button>
      <button class="btn btn-danger btn-sm" onclick="tabooBuzz()">🚫 Buzz</button>
    </div>
  `;

  s.timer=setInterval(()=>{
    s.timeLeft--;
    const pct=(s.timeLeft/s.timerSec)*100;
    const bar=document.getElementById('timerBar');
    const txt=document.getElementById('timerText');
    if(bar){bar.style.width=pct+'%';bar.style.background=pct>30?'var(--green)':pct>10?'var(--yellow)':'var(--red)';}
    if(txt)txt.textContent=s.timeLeft+'s';
    if(s.timeLeft<=5&&s.timeLeft>0)sfxTick();
    if(s.timeLeft<=0){clearInterval(s.timer);sfxBuzz();tabooNextTurn();}
  },1000);
}

function updateTeamScoreBar(){
  const s=gameState;
  if(!s.teams)return;
  document.querySelectorAll('.team-score-box').forEach((box,i)=>{
    if(s.teams[i]){box.querySelector('.team-pts').textContent=s.teams[i].score;}
  });
}

function setupCanvas(){
  const canvas=document.getElementById('drawCanvas');
  const wrap=document.getElementById('canvasWrap');
  const ctx=canvas.getContext('2d');
  ctx.fillStyle='white';ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.lineCap='round';ctx.lineJoin='round';

  let drawing=false;
  function getPos(e){
    const rect=canvas.getBoundingClientRect();
    const x=((e.touches?e.touches[0].clientX:e.clientX)-rect.left)*(canvas.width/rect.width);
    const y=((e.touches?e.touches[0].clientY:e.clientY)-rect.top)*(canvas.height/rect.height);
    return{x,y};
  }
  function start(e){e.preventDefault();drawing=true;const p=getPos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);}
  function move(e){if(!drawing)return;e.preventDefault();const p=getPos(e);ctx.strokeStyle=gameState.drawColor;ctx.lineWidth=gameState.drawSize;ctx.lineTo(p.x,p.y);ctx.stroke();}
  function end(){drawing=false;}

  canvas.addEventListener('mousedown',start);canvas.addEventListener('mousemove',move);canvas.addEventListener('mouseup',end);canvas.addEventListener('mouseleave',end);
  canvas.addEventListener('touchstart',start,{passive:false});canvas.addEventListener('touchmove',move,{passive:false});canvas.addEventListener('touchend',end);
}

function revealDrawWord(){
  const el=document.getElementById('drawWord');
  if(!el||!gameState.currentCard)return;
  if(el.classList.contains('draw-word-hidden')){

    el.textContent='Draw: '+gameState.currentCard.word;
    el.onclick=()=>hideDrawWord();

// ════════════════════════════════════════════
function startWordAssoc(){
  const players=getPlayers();
  if(players.length<2){alert('Need at least 2 players');return;}
  const s=gameState;
  s.players=players.map(p=>({name:p,alive:true}));
  s.currentPlayer=0;
  s.chain=[shuffle(WA_STARTERS)[0]];
  s.timeLeft=s.timerSec;
  s.roundNum=1;
  showScreen('play');
  renderWordAssocTurn();
}

function renderWordAssocTurn(){
  const s=gameState;
  const alivePlayers=s.players.filter(p=>p.alive);
  if(alivePlayers.length<=1){showWordAssocResults();return;}

  // Find next alive player
  while(!s.players[s.currentPlayer].alive)s.currentPlayer=(s.currentPlayer+1)%s.players.length;
  const player=s.players[s.currentPlayer];
  s.timeLeft=s.timerSec;
  if(s.timer)clearInterval(s.timer);

  const el=document.getElementById('playContent');
  el.innerHTML=`
    <div style="text-align:center;margin-top:20px">
      <div class="score-display">Round ${s.roundNum} · ${alivePlayers.length} players left</div>
      <div class="wa-player-tag">${player.name}'s turn</div>
    </div>
    <div class="wa-timer-circle" id="waTimer">${s.timeLeft}</div>
    <div class="wa-current-word" id="waWord">${s.chain[s.chain.length-1]}</div>
    <div style="padding:0 20px">
      <input class="input" id="waInput" placeholder="Type a related word..." autofocus autocomplete="off" onkeydown="if(event.key==='Enter')submitWord()">
    </div>
    <div style="display:flex;gap:12px;margin-top:16px;justify-content:center">
      <button class="btn btn-primary" onclick="submitWord()">Submit</button>
      <button class="btn btn-danger btn-sm" onclick="waEliminate()">❌ Can't think of one</button>
    </div>
    <div class="wa-chain">${s.chain.slice(-12).map(w=>`<span>${w}</span>`).join('')}</div>
  `;

  setTimeout(()=>{const inp=document.getElementById('waInput');if(inp)inp.focus();},100);

  s.timer=setInterval(()=>{
    s.timeLeft--;
    const circle=document.getElementById('waTimer');
    if(circle){
      circle.textContent=s.timeLeft;
      circle.className='wa-timer-circle'+(s.timeLeft<=3?' danger':s.timeLeft<=5?' warning':'');
    }
    if(s.timeLeft<=3&&s.timeLeft>0)sfxTick();
    if(s.timeLeft<=0){clearInterval(s.timer);sfxBuzz();waEliminate();}
  },1000);
}

function submitWord(){
  const inp=document.getElementById('waInput');
  const word=inp?.value.trim();
  if(!word)return;
  sfxCorrect();
  const s=gameState;
  s.chain.push(word);
  s.roundNum++;
  s.currentPlayer=(s.currentPlayer+1)%s.players.length;
  if(s.timer)clearInterval(s.timer);
  // Find next alive player
  while(!s.players[s.currentPlayer].alive)s.currentPlayer=(s.currentPlayer+1)%s.players.length;
  showPassScreen(s.players[s.currentPlayer].name,'Your turn — think fast!',renderWordAssocTurn);
}

function waEliminate(){
  const s=gameState;
  sfxWrong();
  s.players[s.currentPlayer].alive=false;
  if(s.timer)clearInterval(s.timer);

  const el=document.getElementById('playContent');
  const name=s.players[s.currentPlayer].name;
  s.currentPlayer=(s.currentPlayer+1)%s.players.length;

  // Quick overlay
  const alivePlayers=s.players.filter(p=>p.alive);
  if(alivePlayers.length<=1){setTimeout(showWordAssocResults,500);return;}

  el.innerHTML=`
    <div style="text-align:center;margin-top:80px;animation:pop 0.3s ease">
      <div style="font-size:64px;margin-bottom:16px">💀</div>
      <h2 style="font-size:24px;font-weight:800">${name} is out!</h2>
      <p style="color:var(--text2);margin-top:8px">${alivePlayers.length} players remaining</p>
      <button class="btn btn-primary" style="margin-top:24px" onclick="renderWordAssocTurn()">Continue</button>
    </div>
  `;
}

function showWordAssocResults(){
  const winner=gameState.players.find(p=>p.alive);
  sfxWin();showConfetti();
  showScreen('results');
  document.getElementById('resultsContent').innerHTML=`
    <div style="text-align:center;margin:60px 0 24px;animation:pop 0.3s ease">
      <div style="font-size:64px;margin-bottom:16px">🏆</div>
      <h2 style="font-size:28px;font-weight:800">${winner?winner.name:'Nobody'} Wins!</h2>
      <p style="color:var(--text2);margin-top:8px">Chain length: ${gameState.chain.length} words</p>
      <div class="wa-chain" style="margin:20px 0;max-height:120px">${gameState.chain.map(w=>`<span>${w}</span>`).join('')}</div>
    </div>
    <button class="btn btn-primary btn-block" onclick="setupGame('wordassoc')">Play Again</button>
    <button class="btn btn-secondary btn-block" style="margin-top:10px" onclick="showScreen('home')">Back to Games</button>
  `;
}

// ════════════════════════════════════════════
//  FAMILY FEUD
// ════════════════════════════════════════════
function startFamilyFeud(){
  const s=gameState;
  const t1=document.getElementById('team1Name')?.value||'Team 1';
  const t2=document.getElementById('team2Name')?.value||'Team 2';
  s.teams=[{name:t1,score:0},{name:t2,score:0}];
  s.currentTeam=0;
  s.surveys=shuffle([...FEUD_SURVEYS]);
  s.surveyIdx=0;
  s.roundsPlayed=0;
  s.strikes=0;
  s.revealed=new Set();
  s.roundPoints=0;
  s.phase='playing'; // playing, steal
  s.playingTeam=0; // tracks who started the round (for steal logic)
  showScreen('play');
  renderFeudRound();
}

function feudMatchGuess(guess, answer){
  // Case-insensitive matching: substring match, or word overlap
  const g=guess.toLowerCase().trim();
  const a=answer.toLowerCase().trim();
  if(!g)return false;
  // Direct substring match
  if(a.includes(g)||g.includes(a))return true;
  // Word overlap: if any word in the guess matches any word in the answer
  const gWords=g.split(/\s+/);
  const aWords=a.split(/\s+/);
  for(const gw of gWords){
    if(gw.length<2)continue; // skip tiny words
    for(const aw of aWords){
      if(aw.length<2)continue;
      if(aw.includes(gw)||gw.includes(aw))return true;
    }
  }
  return false;
}

function renderFeudRound(){
  const s=gameState;
  if(s.roundsPlayed>=s.rounds){showFeudResults();return;}
  if(s.surveyIdx>=s.surveys.length){s.surveyIdx=0;s.surveys=shuffle([...FEUD_SURVEYS]);}
  const survey=s.surveys[s.surveyIdx];
  s.strikes=0;s.revealed=new Set();s.roundPoints=0;s.phase='playing';
  s.playingTeam=s.currentTeam;
  const team=s.teams[s.currentTeam];
  const el=document.getElementById('playContent');
  el.innerHTML=`
    ${renderTeamScoreBar(s.teams, s.currentTeam)}
    <div class="score-display">Round ${s.roundsPlayed+1} of ${s.rounds}</div>
    <div class="feud-question" style="position:relative">${survey.q}
      <button onclick="feudSkipSurvey()" title="Skip to a new survey" style="position:absolute;top:-8px;right:-8px;background:var(--surface2);border:1px solid var(--border);color:var(--text2);font-size:12px;padding:4px 10px;border-radius:20px;cursor:pointer;font-weight:600;opacity:0.8;transition:opacity 0.2s" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.8'">Skip ↻</button>
    </div>
    <div class="feud-board" id="feudBoard">
      ${survey.answers.map((ans,i)=>`
        <div class="feud-answer hidden" id="feud-a-${i}">
          <div class="feud-num">${i+1}</div>
          <div class="feud-text">${ans.a}</div>
          <div class="feud-pts">${ans.pts} pts</div>
        </div>
      `).join('')}
    </div>
    <div class="feud-strikes" id="feudStrikes">
      <span class="feud-x" id="strike0">✕</span>
      <span class="feud-x" id="strike1">✕</span>
      <span class="feud-x" id="strike2">✕</span>
    </div>
    <div style="text-align:center;margin:8px 0">
      <div style="font-size:14px;font-weight:600;color:var(--text2)" id="feudStatus">${team.name} is guessing</div>
      <div style="font-size:22px;font-weight:800;color:var(--yellow);margin:4px 0" id="feudPts">0 pts this round</div>
    </div>
    <div style="display:flex;gap:10px;margin-top:8px;justify-content:center;flex-wrap:wrap" id="feudControls">
      <input class="input" id="feudGuess" placeholder="Type your guess..." style="max-width:280px" autocomplete="off" onkeydown="if(event.key==='Enter')feudSubmitGuess()">
      <button class="btn btn-primary btn-sm" onclick="feudSubmitGuess()">Guess</button>
    </div>
  `;
  setTimeout(()=>{const inp=document.getElementById('feudGuess');if(inp)inp.focus();},100);
}

function feudSkipSurvey(){
  sfxClick();
  const s=gameState;
  s.surveyIdx++;
  renderFeudRound();
}

function feudRevealAnswer(idx){
  const s=gameState;
  const survey=s.surveys[s.surveyIdx];
  if(s.revealed.has(idx))return;
  s.revealed.add(idx);
  const el=document.getElementById('feud-a-'+idx);
  if(el){el.classList.remove('hidden');el.classList.add('revealed');el.style.animation='none';el.offsetHeight;el.style.animation='feudFlip 0.4s ease';}
  s.roundPoints+=survey.answers[idx].pts;
  const ptsEl=document.getElementById('feudPts');
  if(ptsEl)ptsEl.textContent=s.roundPoints+' pts this round';
  sfxReveal();
  // Check if all revealed
  if(s.revealed.size===survey.answers.length){
    feudAwardRound();
  }
}

function feudSubmitGuess(){
  const inp=document.getElementById('feudGuess');
  const guess=inp?.value.trim();
  if(!guess)return;
  inp.value='';
  const s=gameState;
  const survey=s.surveys[s.surveyIdx];
  let found=false;
  survey.answers.forEach((ans,i)=>{
    if(!s.revealed.has(i)&&feudMatchGuess(guess, ans.a)){
      feudRevealAnswer(i);
      found=true;
    }
  });
  if(!found){
    feudStrike();
  }
  setTimeout(()=>{const inp2=document.getElementById('feudGuess');if(inp2)inp2.focus();},50);
}

function feudStrike(){
  const s=gameState;
  if(s.strikes>=3)return; // prevent extra strikes
  const sx=document.getElementById('strike'+s.strikes);
  if(sx){sx.classList.add('active');sx.classList.add('slam');sx.style.animation='none';sx.offsetHeight;sx.style.animation='strikeSlam 0.35s ease';}
  s.strikes++;
  sfxWrong();
  if(s.strikes>=3){
    if(s.phase==='playing'){
      // Other team gets a chance to steal
      s.phase='steal';
      s.currentTeam=(s.currentTeam+1)%2;
      s.strikes=0;
      // Reset strike visuals
      document.querySelectorAll('.feud-x').forEach(x=>{x.classList.remove('active');x.classList.remove('slam');});
      // Update team score bar highlighting
      document.querySelectorAll('.team-score-box').forEach((box,i)=>{
        box.classList.toggle('active-team',i===s.currentTeam);
        box.classList.toggle('inactive-team',i!==s.currentTeam);
      });
      const status=document.getElementById('feudStatus');
      if(status){status.textContent=s.teams[s.currentTeam].name+' can STEAL!';status.style.color='var(--yellow)';status.style.fontWeight='800';status.style.fontSize='16px';}
    } else {
      // Steal failed — reveal all remaining, award points to original playing team
      s.currentTeam=s.playingTeam;
      feudAwardRound();
    }
  }
}

function feudAwardRound(){
  const s=gameState;
  // Reveal all remaining
  const survey=s.surveys[s.surveyIdx];
  survey.answers.forEach((_,i)=>{
    if(!s.revealed.has(i)){
      s.revealed.add(i);
      const el=document.getElementById('feud-a-'+i);
      if(el){el.classList.remove('hidden');el.classList.add('revealed');el.style.animation='none';el.offsetHeight;el.style.animation='feudFlip 0.4s ease';}
      s.roundPoints+=survey.answers[i].pts;
    }
  });
  // Award points to current team
  s.teams[s.currentTeam].score+=s.roundPoints;
  // Show banner
  const banner=document.createElement('div');
  banner.className='feud-banner';
  banner.textContent='SURVEY SAYS! '+s.roundPoints+' pts to '+s.teams[s.currentTeam].name+'!';
  document.body.appendChild(banner);
  sfxDramatic();
  // Update displayed scores
  const ptsEl=document.getElementById('feudPts');
  if(ptsEl)ptsEl.textContent=s.roundPoints+' pts this round';
  // Disable input
  const controls=document.getElementById('feudControls');
  if(controls)controls.style.display='none';
  setTimeout(()=>{
    banner.remove();
    s.surveyIdx++;
    s.roundsPlayed++;
    s.currentTeam=s.roundsPlayed%2;
    if(s.roundsPlayed<s.rounds){
      showTeamTransition(s.teams[s.currentTeam].name, renderFeudRound);
    } else {
      renderFeudRound(); // will trigger showFeudResults
    }
  },2500);
}

function showFeudResults(){
  const teams=[...gameState.teams].sort((a,b)=>b.score-a.score);
  sfxWin();showConfetti();
  showScreen('results');
  document.getElementById('resultsContent').innerHTML=`
    <div style="text-align:center;margin:60px 0 24px;animation:pop 0.3s ease">
      <div style="font-size:64px;margin-bottom:16px">🏆</div>
      <h2 style="font-size:28px;font-weight:800">${teams[0].name} Wins!</h2>
      <p style="color:var(--text2);margin-top:4px">${teams[0].score} to ${teams[1].score}</p>
    </div>
    <div class="scoreboard">
      ${teams.map((t,i)=>`<div class="score-row ${i===0?'highlight':''}"><span class="name">${i===0?'🥇':'🥈'} ${t.name}</span><span class="pts">${t.score} pts</span></div>`).join('')}
    </div>
    <button class="btn btn-primary btn-block" style="margin-top:24px" onclick="setupGame('familyfeud')">Play Again</button>
    <button class="btn btn-secondary btn-block" style="margin-top:10px" onclick="showScreen('home')">Back to Games</button>
  `;
}

// ════════════════════════════════════════════
//  CODENAMES
// ════════════════════════════════════════════
function startCodenames(){
  const s=gameState;
  const t1=document.getElementById('team1Name')?.value||'Red Team';
  const t2=document.getElementById('team2Name')?.value||'Blue Team';
  s.redName=t1;s.blueName=t2;
  // Pick 25 random words
  const words=shuffle([...CN_WORDS]).slice(0,25);
  // Assign colors: 9 red, 8 blue, 7 neutral, 1 assassin (red goes first)
  const colors=shuffle([...Array(9).fill('red'),...Array(8).fill('blue'),...Array(7).fill('neutral'),'assassin']);
  s.cards=words.map((w,i)=>({word:w,color:colors[i],revealed:false}));
  s.turn='red'; // red goes first (has 9)
  s.redLeft=9;s.blueLeft=8;
  s.guessesLeft=0;
  s.clue='';s.clueNum=0;
  s.spymasterView=false;
  s.gameOver=false;
  showScreen('play');
  renderCodenames();
}

function renderCodenames(){
  const s=gameState;
  const el=document.getElementById('playContent');
  const turnColor=s.turn==='red'?'red-turn':'blue-turn';
  const turnName=s.turn==='red'?s.redName:s.blueName;

  el.innerHTML=`
    <div class="cn-scores">
      <div class="cn-score-box red">${s.redName}: ${s.redLeft} left</div>
      <div class="cn-score-box blue">${s.blueName}: ${s.blueLeft} left</div>
    </div>
    <div class="cn-turn-bar ${turnColor}">
      <span>${turnName}'s turn</span>
      <span>${s.guessesLeft>0?s.guessesLeft+' guesses left':'Waiting for clue'}</span>
    </div>
    ${s.clue?`<div class="cn-clue-area"><div class="cn-clue-display">"${s.clue}" — ${s.clueNum}</div></div>`:''}
    <div class="cn-grid" id="cnGrid">
      ${s.cards.map((c,i)=>{
        let cls='cn-card';
        if(c.revealed){cls+=' '+c.color+' revealed';}
        else{
          cls+=' unrevealed';
          if(s.spymasterView)cls+=' sp-'+c.color;
        }
        return `<div class="${cls}" onclick="cnClickCard(${i})">${c.word}</div>`;
      }).join('')}
    </div>
    <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:8px 0">
      <button class="btn btn-sm ${s.spymasterView?'btn-primary':'btn-secondary'}" onclick="cnToggleSpy()">🕵️ ${s.spymasterView?'Hide':'Show'} Spymaster</button>
      <button class="btn btn-sm btn-secondary" onclick="cnEndTurn()">End Turn</button>
    </div>
    ${!s.gameOver&&s.guessesLeft===0?`
    <div style="display:flex;gap:8px;align-items:center;justify-content:center;margin:10px 0">
      <input class="input" id="cnClueInput" placeholder="One-word clue" style="max-width:160px" autocomplete="off">
      <input class="input" id="cnClueNum" placeholder="#" type="number" min="1" max="9" style="max-width:60px">
      <button class="btn btn-sm btn-primary" onclick="cnGiveClue()">Give Clue</button>
    </div>
    `:''}
  `;
}

function cnToggleSpy(){
  gameState.spymasterView=!gameState.spymasterView;
  renderCodenames();
}

function cnGiveClue(){
  const clue=document.getElementById('cnClueInput')?.value.trim();
  const num=parseInt(document.getElementById('cnClueNum')?.value);
  if(!clue||!num||num<1)return;
  gameState.clue=clue;
  gameState.clueNum=num;
  gameState.guessesLeft=num+1; // one extra guess allowed
  sfxReveal();
  renderCodenames();
}

function cnClickCard(idx){
  const s=gameState;
  if(s.gameOver||s.guessesLeft<=0)return;
  const card=s.cards[idx];
  if(card.revealed)return;
  card.revealed=true;

  if(card.color==='assassin'){
    sfxBuzz();
    s.gameOver=true;
    const loser=s.turn;
    const winner=loser==='red'?s.blueName:s.redName;
    setTimeout(()=>{
      showScreen('results');
      document.getElementById('resultsContent').innerHTML=`
        <div style="text-align:center;margin:60px 0 24px;animation:pop 0.3s ease">
          <div style="font-size:64px;margin-bottom:16px">💀</div>
          <h2 style="font-size:28px;font-weight:800">ASSASSIN!</h2>
          <p style="color:var(--text2);margin-top:8px">${s.turn==='red'?s.redName:s.blueName} found the assassin.</p>
          <p style="font-size:20px;font-weight:700;margin-top:16px">${winner} wins!</p>
        </div>
        <button class="btn btn-primary btn-block" style="margin-top:24px" onclick="setupGame('codenames')">Play Again</button>
        <button class="btn btn-secondary btn-block" style="margin-top:10px" onclick="showScreen('home')">Back to Games</button>
      `;
    },800);
    renderCodenames();
    return;
  }

  if(card.color==='red')s.redLeft--;
  if(card.color==='blue')s.blueLeft--;

  // Check win
  if(s.redLeft===0){
    sfxWin();showConfetti();s.gameOver=true;
    setTimeout(()=>cnShowWinner(s.redName),600);
    renderCodenames();return;
  }
  if(s.blueLeft===0){
    sfxWin();showConfetti();s.gameOver=true;
    setTimeout(()=>cnShowWinner(s.blueName),600);
    renderCodenames();return;
  }

  if(card.color===s.turn){
    sfxCorrect();
    s.guessesLeft--;
    if(s.guessesLeft<=0){cnEndTurn();}
    else{renderCodenames();}
  } else {
    sfxWrong();
    s.guessesLeft=0;
    cnEndTurn();
  }
}

function cnEndTurn(){
  const s=gameState;
  if(s.gameOver)return;
  s.turn=s.turn==='red'?'blue':'red';
  s.guessesLeft=0;s.clue='';s.clueNum=0;
  renderCodenames();
}

function cnShowWinner(name){
  showScreen('results');
  document.getElementById('resultsContent').innerHTML=`
    <div style="text-align:center;margin:60px 0 24px;animation:pop 0.3s ease">
      <div style="font-size:64px;margin-bottom:16px">🏆</div>
      <h2 style="font-size:28px;font-weight:800">${name} Wins!</h2>
      <p style="color:var(--text2);margin-top:8px">All agents found!</p>
    </div>
    <button class="btn btn-primary btn-block" style="margin-top:24px" onclick="setupGame('codenames')">Play Again</button>
    <button class="btn btn-secondary btn-block" style="margin-top:10px" onclick="showScreen('home')">Back to Games</button>
  `;
}

// ════════════════════════════════════════════
//  START WHEEL OF FORTUNE
// ════════════════════════════════════════════
function startWheelOfFortune(){
  const players=getPlayers();
  if(players.length<2){alert('Need at least 2 players!');return;}
  if(players.length>4){alert('Maximum 4 players!');return;}
  const s=gameState;
  s.teams=players.map(p=>({name:p,score:0,roundBank:0}));
  s.currentPlayer=0;
  s.round=1;
  s.roundStarter=0;
  s.usedPuzzles=new Set();
  s.wheelRotation=0;
  s.spinning=false;
  const puzzle=wofGetPuzzle();
  s.puzzle=puzzle;
  s.revealedLetters=new Set();
  s.guessedLetters=new Set();
  s.phase='spin';
  s.buyingVowel=false;
  s.currentAmount=0;
  s.lastResult='';
  s.lastResultColor='';
  s.lastResultTextColor='';
  showScreen('play');
  showTeamTransition(s.teams[0].name,()=>{renderWOF();});
}

        <div class="score-row ${i===0?'highlight':''}">

          <span class="pts">${t.score} pts</span>
        </div>
      `).join('')}

    <button class="btn btn-primary btn-block" style="margin-top:24px" onclick="setupGame('${currentGame}')">Play Again</button>
    <button class="btn btn-secondary btn-block" style="margin-top:10px" onclick="showScreen('home')">Back to Games</button>
  `;
}
